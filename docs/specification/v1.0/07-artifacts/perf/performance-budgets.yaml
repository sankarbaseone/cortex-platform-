# ECD-014 — measurable budgets per subsystem. Methodology fixed; CI/weekly enforcement mapped.
version: 1
methodology:
  runs: ">=5, report median; MAD/median<3% else rerun on different node"
  env: pinned staging pool
  warmup_runs: 2
  load_gen: [k6, ghz, criterion, go-bench]
  regression_rule: ">10% vs last release = blocker; 5-10% = ticket"
api:
  list_p95_ms: 250
  detail_p95_ms: 120
  availability_pct: 99.9
  rate_capacity_rps_per_replica: 150
  rate_capacity_method: "ghz, grpc unary mix"
ingest:
  e2e_p95_s: 60
  gateway_throughput_envelopes_s_per_replica: 20000
  ch_sink_rows_s_per_replica: 50000
  collector_overhead:
    cpu_pct_per_node: "<1"
    mem_mb: "<256"
    gpu_perf_impact_pct: "<0.5 (dcgm sampling only)"
compiler:
  first_score_p95_s: 300
  static_analysis_p95_ms_per_kernel: 500
  static_analysis_scope: "canonicalize+parse+score, cached toolchain"
  canonicalizer_p95_ms: 50
  kes_score_p95_us: 200
  cache_hit_target: ">0.9 steady state"
regression:
  gate_sync_p95_s: 25
  fleet_cri_compute_p95_s: 5
  fleet_cri_scale: "1e5 families"
graph:
  named_query_p95_ms: 500
  named_query_scope: 2-hop
  fallback_mv_p95_ms: 50
finance:
  attribution_query_p95_ms: 800
  attribution_scope: "month window, team dim"
  apportion_batch_min_rows_s: 100000
twin:
  scenario_p95_ms: 100
  grid_200_p95_s: 30
  mape_ceiling: 0.15
policy:
  decide_p95_ms: 50
  decide_scope: cached bundle
  bundle_reload_p95_ms: 500
audit:
  append_p95_ms: 10
  verify_1M_entries_s: 10
frontend:
  LCP_p75_ms: 2500
  INP_p75_ms: 200
  bundle_kb_gz_initial: 350
  table_scroll_fps: ">50 at 10k rows"
agents:
  task_budget_default_usd: 2.00
  advisor_first_token_p95_s: 3
scaling_curves_required:
  - "gateway envelopes/s vs replicas (linear to 8)"
  - "ch-sink rows/s vs replicas"
  - "api rps vs replicas"
  - "twin scenarios/min vs pods"
scaling_curves_producer: "weekly loadtest job; stored as CI artifacts"
capacity_model: "100k-GPU reference tenant = 4x gateway, 3x each CP svc, 2-shard CH; headroom 3x (ECD-006 math)"
