# make dev-up backing stack (kind runs services; this provides stateful deps).
name: nydux-dev
services:
  postgres:
    image: postgres:16.4
    environment: {POSTGRES_USER: nydux, POSTGRES_PASSWORD: nydux, POSTGRES_DB: nydux}
    ports: ["5432:5432"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U nydux"], interval: 5s, retries: 10}
  timescale:
    image: timescale/timescaledb:2.16.1-pg16
    environment: {POSTGRES_USER: nydux, POSTGRES_PASSWORD: nydux, POSTGRES_DB: nydux_ts}
    ports: ["5433:5432"]
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports: ["8123:8123", "9000:9000"]
    ulimits: {nofile: {soft: 262144, hard: 262144}}
  redpanda:   # Kafka-API dev broker (OQ-04 permits drop-in)
    image: redpandadata/redpanda:v24.2.4
    command: [redpanda, start, --overprovisioned, --smp=1, --memory=1G,
              --kafka-addr=PLAINTEXT://0.0.0.0:9092,
              --advertise-kafka-addr=PLAINTEXT://localhost:9092]
    ports: ["9092:9092"]
  redis:
    image: redis:7.4
    command: [redis-server, --appendonly, "yes"]
    ports: ["6379:6379"]
  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    command: [server, /data, --console-address, ":9001"]
    environment: {MINIO_ROOT_USER: nydux, MINIO_ROOT_PASSWORD: nydux-dev-secret}
    ports: ["9002:9000", "9001:9001"]
