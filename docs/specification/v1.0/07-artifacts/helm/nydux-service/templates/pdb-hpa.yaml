apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: {name: {{ .Values.name }}}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector: {matchLabels: {app.kubernetes.io/name: {{ .Values.name }}}}
{{- if .Values.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: {{ .Values.name }}}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: {{ .Values.name }}}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource: {name: cpu, target: {type: Utilization, averageUtilization: {{ .Values.hpa.targetCPUUtilizationPercent }}}}
{{- end }}
