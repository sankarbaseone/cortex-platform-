{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: {{ .Values.name }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: {{ .Values.name }}}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/part-of: nydux}}}]
      ports: [{port: {{ .Values.grpcPort }}}, {port: {{ .Values.opsPort }}}]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/part-of: nydux}}}]
    {{- range .Values.networkPolicy.egressAllow }}
    - to: [{{ toYaml . | nindent 10 }}]
    {{- end }}
    - to: []   # DNS
      ports: [{port: 53, protocol: UDP}, {port: 53, protocol: TCP}]
{{- end }}
