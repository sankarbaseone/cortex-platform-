syntax = "proto3";
package nydux.policy.v1;
option go_package = "github.com/nydux/platform/api/nydux/policy/v1;policyv1";
import "buf/validate/validate.proto";

message DecideRequest {
  string policy_id = 1 [(buf.validate.field).string.uuid = true];
  string subject_kind = 2 [(buf.validate.field).string = {in: ["recommendation","toolchain","deploy","agent_tool"]}];
  string subject_id = 3;
  bytes input_json = 4;  // canonical JSON input document
}

message Decision {
  string verdict = 1 [(buf.validate.field).string = {in: ["allow","block","warn"]}];
  string policy_id = 2;
  int32 policy_version = 3;
  repeated string reasons = 4;
  int64 ledger_seq = 5;
  int64 decided_at_ns = 6;
}

message PolicyDecisionEvent {  // payload for nydux.policy.decision.v1
  Decision decision = 1;
  string subject_kind = 2;
  string subject_id = 3;
}

service PolicyService {
  rpc Decide(DecideRequest) returns (Decision);
}
