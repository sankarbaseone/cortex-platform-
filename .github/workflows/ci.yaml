# T-005 ci-live. Authored from RFC-011 J.3 (pipeline stages) + Q (quality
# gates), and ECD-010's job description, per GAP-007: the "shipped"
# artifacts/infra/gha/ci.yaml ECD-010 claims to ship does not exist anywhere
# in the specification archive.
#
# Every job below is a named, always-present gate (Q table: "every PR;
# enforced, not advisory"). Jobs whose real implementation belongs to a later
# build-order task (image build matrix, kind e2e smoke, coverage gate,
# benchmark diff, SBOM+sign, privacy-egress check) no-op with an explicit
# message today, mirroring the graceful-skip convention already established
# in tools/mk/{go,dev,release}.mk - this is what ECD-015 calls the "empty
# green pipeline" T-001..T-005 must produce before any feature code.
name: CI

on:
  pull_request:
  push:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUF_AGAINST_REF: ${{ github.event.pull_request.base.ref || 'develop' }}

jobs:
  lint:
    name: lint (golangci, buf, clippy, ruff, eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: jdx/mise-action@v2
      - run: make bootstrap
      - run: make lint
      - name: clippy (analyzers/, when Rust sources exist)
        run: |
          if find analyzers crates -name Cargo.toml 2>/dev/null | grep -q .; then
            cargo clippy --workspace -- -D warnings
          else
            echo "==> clippy: no Cargo.toml yet - skipping"
          fi
      - name: ruff (agents/, when Python sources exist)
        run: |
          if find agents -name '*.py' 2>/dev/null | grep -q .; then
            uvx ruff check agents
          else
            echo "==> ruff: no agents/*.py yet - skipping"
          fi
      - name: eslint (web/, when a package.json exists)
        run: |
          if [ -f web/app/package.json ]; then
            pnpm -C web/app lint
          else
            echo "==> eslint: no web/app/package.json yet - skipping"
          fi

  typecheck:
    name: typecheck (tsc, when web/app exists)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: |
          if [ -f web/app/package.json ]; then
            pnpm -C web/app install --frozen-lockfile
            pnpm -C web/app typecheck
          else
            echo "==> typecheck: no web/app/package.json yet - skipping"
          fi

  unit-test:
    name: unit tests (go -race, cargo, pytest, vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: make bootstrap
      - run: go test -race ./...
      - name: cargo test (analyzers/, when Rust sources exist)
        run: |
          if find analyzers crates -name Cargo.toml 2>/dev/null | grep -q .; then
            cargo test --workspace
          else
            echo "==> cargo test: no Cargo.toml yet - skipping"
          fi
      - name: pytest (agents/, when Python sources exist)
        run: |
          if find agents -name '*.py' 2>/dev/null | grep -q .; then
            uv run pytest agents
          else
            echo "==> pytest: no agents/*.py yet - skipping"
          fi
      - name: vitest (web/, when a package.json exists)
        run: |
          if [ -f web/app/package.json ]; then
            pnpm -C web/app test
          else
            echo "==> vitest: no web/app/package.json yet - skipping"
          fi

  buf-breaking:
    name: buf breaking-change check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: jdx/mise-action@v2
      - run: make bootstrap
      - run: make breaking

  gen-drift:
    name: registry drift check (tools/genmanifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: make bootstrap
      - run: make gen-check

  security:
    name: security (semgrep, gitleaks, osv-scanner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: jdx/mise-action@v2
      - run: make bootstrap
      - name: install semgrep
        run: uv tool install semgrep
      - name: install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: install osv-scanner
        run: |
          curl -sSL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v1.9.1/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner
      - name: semgrep rule self-test
        run: make semgrep-test
      - run: make security
      - name: schema egress diff (D.9 privacy filter)
        run: |
          if [ -d analyzers/edge-gateway ] || [ -d dataplane/edge-gateway ]; then
            echo "==> privacy-egress: edge-gateway exists but the D.9 schema-diff check is not wired yet (T-103) - skipping"
          else
            echo "==> privacy-egress: edge-gateway (D.9 filter) not built yet - skipping"
          fi

  itest:
    name: integration tests (kind + testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: make bootstrap
      # itest-tagged tests dial the real stateful deps directly (no kind
      # cluster/testcontainers wiring yet - that lands with S1's services);
      # bring them up the same way `make dev-up` does for local dev.
      - run: make dev-up
      - run: make itest
      - if: always()
        run: make dev-down

  build-matrix:
    name: build image (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - control-plane-api
          - kernel-registry
          - regression-svc
          - bench-runner
          - recommender
          - graph-svc
          - finance-svc
          - savings-svc
          - twin-svc
          - policy-svc
          - audit-svc
          - notify-svc
          - tenant-svc
          - auth-svc
          - ch-sink
          - ts-sink
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: make image SVC=${{ matrix.service }}
      # provenance attestation + SBOM + cosign sign land alongside the first
      # real Dockerfile per service (RFC-011 J.7); nothing to attest yet.

  container-scan:
    name: container scan (trivy)
    runs-on: ubuntu-latest
    needs: build-matrix
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "==> container-scan: no built images yet (tools/mk/release.mk 'image' is still a stub) - skipping"

  e2e-smoke:
    name: e2e smoke (ephemeral kind env)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: make e2e

  coverage:
    name: coverage gate (changed-lines >=80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: jdx/mise-action@v2
      - run: make bootstrap
      - name: go test -cover
        run: |
          if [ -n "$(find . -path ./docs -prune -o -name '*.go' -print 2>/dev/null)" ]; then
            go test ./... -covermode=atomic -coverprofile=coverage.out
            go tool cover -func=coverage.out | tail -1
            echo "NOTE: this is total coverage, not yet the RFC-011 Q changed-lines gate -"
            echo "diff-cover wiring lands once there is a stable base commit with services to diff against."
          else
            echo "==> coverage: no Go source outside docs/ yet - skipping"
          fi

  benchmark-diff:
    name: benchmark diff (hot paths, +/-5% budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: make bench

  sbom-sign:
    name: SBOM + sign
    runs-on: ubuntu-latest
    needs: build-matrix
    steps:
      - uses: actions/checkout@v4
      - run: make sbom
      - run: make sign

  all-green:
    name: all gates
    if: always()
    needs:
      - lint
      - typecheck
      - unit-test
      - buf-breaking
      - gen-drift
      - security
      - itest
      - build-matrix
      - container-scan
      - e2e-smoke
      - coverage
      - benchmark-diff
      - sbom-sign
    runs-on: ubuntu-latest
    steps:
      - name: require all gates green
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "all gates green"
